<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Apartment Analysis - Seoul Housing</title>
  <link rel="stylesheet" href="styles.css" />
  <style>
    .tab-group {
      display: flex;
      gap: 12px;
      margin-bottom: 32px;
      flex-wrap: wrap;
    }
    .tab-btn {
      padding: 12px 28px;
      border: 1px solid var(--border);
      border-radius: 999px;
      background: var(--card);
      color: var(--muted-fg);
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      box-shadow: var(--shadow);
    }
    .tab-btn:hover {
      border-color: var(--primary);
      color: var(--primary);
    }
    .tab-btn.active {
      background: var(--primary);
      color: var(--primary-fg);
      border-color: var(--primary);
    }
    .tab-panel {
      display: none;
    }
    .tab-panel.active {
      display: block;
    }
    .viz-container {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px;
      box-shadow: var(--shadow);
      min-height: 500px;
    }
    .viz-container iframe {
      width: 100%;
      height: 600px;
      border: none;
      border-radius: 8px;
    }
    .coming-soon {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 400px;
      color: var(--muted);
      font-size: 16px;
      gap: 12px;
    }
    .coming-soon .icon {
      font-size: 48px;
      opacity: 0.5;
    }
  </style>
</head>
<body class="sub-page">
<nav class="navbar scrolled">
  <div class="navbar-inner">
    <button class="navbar-brand" onclick="window.location.href='index.html'"><span>Seoul</span> Housing</button>
  </div>
</nav>
<div class="container">
  <div class="sub-hero">
    <a href="index.html" class="back-link">← back to main</a>
    <h1>🏢 Apartment Analysis</h1>
    <p>Analysis of Apartment Sale and Jeonse Prices in Seoul, with Comparison by District</p>
  </div>

  <div class="tab-group">
    <button class="tab-btn active" onclick="switchTab('sales')">Sales Price</button>
    <button class="tab-btn" onclick="switchTab('jeonse')">Jeonse Deposit</button>
    <button class="tab-btn" onclick="switchTab('rental')">Rental Price</button>
  </div>

  <div id="tab-sales" class="tab-panel active">
    <div class="viz-container">
      <iframe src="https://public.tableau.com/views/project2_1_1/Sheet1?:language=ko-KR&:display_count=n&:origin=viz_share_link&:showVizHome=no&:embed=true" allowfullscreen></iframe>
    </div>
  </div>

  <div id="tab-jeonse" class="tab-panel">
    <div class="viz-container">
      <div class="coming-soon">
        <div class="icon">📊</div>
        <p>Jeonse Deposit 시각화가 곧 추가될 예정입니다.</p>
      </div>
    </div>
  </div>

  <div id="tab-rental" class="tab-panel">
    <div class="viz-container">
      <div class="coming-soon">
        <div class="icon">📊</div>
        <p>Rental Price 시각화가 곧 추가될 예정입니다.</p>
      </div>
    </div>
  </div>
</div>

<script>
function switchTab(tab) {
  document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
  document.querySelectorAll('.tab-panel').forEach(panel => panel.classList.remove('active'));
  event.currentTarget.classList.add('active');
  document.getElementById('tab-' + tab).classList.add('active');
}
</script>
<script src="script.js"></script>
</body>
</html>
